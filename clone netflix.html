<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Netflix Clone</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* NAVBAR */
.navbar {
    position: fixed;
    width: 100%;
    top: 0;
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    z-index: 10;
}

.logo {
    color: #e50914;
    font-size: 32px;
    font-weight: bold;
}

.signin {
    background: #e50914;
    color: white;
    border: none;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 4px;
}

/* HERO */
.hero {
    height: 100vh;
    background: 
        linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2)),
        url('https://assets.nflxext.com/ffe/siteui/vlv3/9f1c7a50-hero.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* CONTENT */
.hero-content h1 {
    font-size: 60px;
    max-width: 800px;
}

.hero-content p {
    font-size: 24px;
    margin: 20px 0;
}

.email-box input {
    padding: 14px;
    width: 320px;
    border: none;
}

.email-box button {
    padding: 14px 20px;
    background: #e50914;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* ROWS */
.row {
    padding: 30px;
}

.row h2 {
    margin-bottom: 15px;
}

.row-posters {
    display: flex;
    overflow-x: auto;
}

.poster {
    width: 180px;
    margin-right: 10px;
    transition: transform 0.3s;
}

.poster:hover {
    transform: scale(1.15);
}
</style>

</head>
<body>

<div class="navbar">
    <div class="logo">NETFLIX</div>
    <button class="signin">Sign In</button>
</div>

<div class="hero">
    <div class="hero-content">
        <h1>Unlimited movies, TV shows and more</h1>
        <p>Watch anywhere. Cancel anytime.</p>
        <div class="email-box">
            <input type="email" placeholder="Email address">
            <button onclick="start()">Get Started ></button>
        </div>
    </div>
</div>

<div class="row">
    <h2>Trending Now</h2>
    <div class="row-posters" id="trending"></div>
</div>

<script>
const movies = [
    "https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg",
    "https://image.tmdb.org/t/p/w300/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg",
    "https://image.tmdb.org/t/p/w300/6MKr3KgOLmzOP6MSuZERO41Lpkt.jpg",
    "https://image.tmdb.org/t/p/w300/kOVEVeg59E0wsnXmF9nrh6OmWII.jpg",
    "https://image.tmdb.org/t/p/w300/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg"
];

const container = document.getElementById("trending");

movies.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.classList.add("poster");
    container.appendChild(img);
});

function start() {
    alert("Welcome to Netflix Clone 🎬");
}
</script>

</body>
</html>
